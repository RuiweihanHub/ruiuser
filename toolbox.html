<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百宝箱 - Rui Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>* { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="min-h-screen bg-white text-gray-900 flex flex-col">
  
  <!-- 未登录提示 -->
  <div id="loginRequired" class="hidden fixed inset-0 z-40 bg-white flex items-center justify-center">
    <div class="text-center">
      <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
      <h2 class="text-xl font-semibold text-gray-700 mb-2">请先登录</h2>
      <p class="text-gray-500 mb-6">请先登录再使用百宝箱功能</p>
      <button onclick="showLoginModal()" class="px-6 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">登录</button>
    </div>
  </div>
  
  <!-- 主内容区 -->
  <div id="mainContent">
  <!-- 顶部导航栏 -->
  <nav class="w-full px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="index.html" class="text-xl font-semibold text-gray-900 hover:text-violet-600 transition-colors">Rui</a>
        <div class="flex items-center gap-6 text-sm">
          <a href="projects.html" class="text-gray-500 hover:text-gray-900 transition-colors">项目</a>
          <a href="toolbox.html" class="text-gray-900 font-medium transition-colors">百宝箱</a>
          <a href="download.html" class="text-gray-500 hover:text-gray-900 transition-colors">下载</a>
          <a href="chat.html" class="text-gray-500 hover:text-gray-900 transition-colors">💬 聊天</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div id="authButtons">
          <a href="register.html" class="px-4 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200 transition-colors">注册</a>
          <button id="loginBtn" class="px-4 py-1.5 bg-gray-900 text-white text-xs font-medium rounded-lg hover:bg-gray-800 transition-colors ml-2">登录</button>
        </div>
        <div id="userMenu" class="hidden relative">
          <button id="userBtn" class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
            <span id="userDisplayName" class="text-sm text-gray-700"></span>
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div id="dropdown" class="hidden absolute right-0 top-full mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 py-1 overflow-hidden">
            <a href="cloud.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">☁️ 云盘</a>
            <a href="chat.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">💬 聊天</a>
            <a href="profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">👤 我的</a>
            <div class="border-t border-gray-100"></div>
            <a href="javascript:void(0)" onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">退出登录</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="flex-1 px-6 py-12">
    <div class="max-w-4xl mx-auto">
      <h2 class="text-2xl font-semibold text-gray-900 mb-8">📦 百宝箱</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <a href="eaglercraft.html" class="p-6 bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl border border-green-100 hover:border-green-200 transition-all duration-300 group">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-green-400 to-emerald-500 rounded-xl flex items-center justify-center text-white text-xl">⛏️</div>
            <div>
              <h3 class="text-base font-medium text-gray-900 group-hover:text-green-700">Eaglercraft</h3>
              <p class="text-sm text-gray-500">在线玩MC 1.12</p>
            </div>
          </div>
        </a>

        <div class="p-6 bg-gray-50 rounded-2xl border border-gray-100 border-dashed flex items-center justify-center">
          <div class="text-center text-gray-400"><span class="text-2xl">🎁</span><p class="text-sm mt-1">更多工具即将上线</p></div>
        </div>
      </div>
    </div>
  </main>
  </div>

  <!-- 登录弹窗 -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/30 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
      <div class="p-6 border-b border-gray-100 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-900">登录</h2>
        <button id="closeBtn" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
      </div>
      <form id="authForm" class="p-6 space-y-4">
        <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600"></div>
        <input id="username" type="text" placeholder="用户名" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-300" required />
        <input id="password" type="password" placeholder="密码" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-300" required />
        <label class="flex items-center gap-2 text-sm text-gray-600"><input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-300">保持登录（7天）</label>
        <button type="submit" class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800">登录</button>
        <div class="text-center text-sm text-gray-500">
          没有账号？<a href="register.html" class="text-violet-600 hover:text-violet-700 font-medium">立即注册</a>
        </div>
      </form>
    </div>
  </div>

  <!-- 引入用户管理系统 -->
  <script src="auth.js"></script>
  <script>
    const LOCAL_USERS = { 'Xvjiarui': 'o7dyuk', 'Ruiweihan': '6052ni', 'Administrator': '1u98e9' };
    function hashPassword(p) { let h=0; for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h;} return Math.abs(h).toString(36); }

    const sessionUser = sessionStorage.getItem('rui_user');
    const rememberedUser = localStorage.getItem('rui_user_remember');

    // 强制登录检查
    if (!sessionUser && !rememberedUser) {
      document.getElementById('loginRequired').classList.remove('hidden');
      document.getElementById('mainContent').classList.add('opacity-0');
    } else {
      document.getElementById('loginRequired').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('opacity-0');
      const user = sessionUser || rememberedUser;
      showLogin(user);
    }

    function showLogin(u) { 
      document.getElementById('authButtons').classList.add('hidden'); 
      document.getElementById('userMenu').classList.remove('hidden'); 
      document.getElementById('userMenu').classList.remove('hidden');
      document.getElementById('userDisplayName').textContent = u; 
    }

    function showLoginModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    document.getElementById('loginBtn').onclick = showLoginModal;
    document.getElementById('closeBtn').onclick = () => { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); };
    document.getElementById('userBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('dropdown').classList.toggle('hidden'); };
    document.addEventListener('click', () => { document.getElementById('dropdown').classList.add('hidden'); });

    document.getElementById('authForm').onsubmit = (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (LOCAL_USERS[u] && LOCAL_USERS[u] === hashPassword(p)) {
        sessionStorage.setItem('rui_user', u);
        if (document.getElementById('rememberMe').checked) { localStorage.setItem('rui_user_remember', u); localStorage.setItem('rui_user_expire', (Date.now() + 7*24*60*60*1000).toString()); }
        location.reload();
      } else { document.getElementById('errorMsg').textContent = '用户名或密码错误'; document.getElementById('errorMsg').classList.remove('hidden'); }
    };

    function logout() { sessionStorage.removeItem('rui_user'); localStorage.removeItem('rui_user_remember'); localStorage.removeItem('rui_user_expire'); location.reload(); }
  </script>
</body>
</html>
