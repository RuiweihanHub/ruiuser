    .avatar-option {

      'from-emerald-400 to-emerald-600', 'from-teal-400 to-teal-600', 'from-cyan-400 to-cyan-600',

      'from-violet-400 to-violet-600', 'from-purple-400 to-purple-600', 'from-fuchsia-400 to-fuchsia-600',
      'from-pink-400 to-pink-600', 'from-rose-400 to-rose-600'
    ];
    
    // 状态
    let currentUser = null;
    let selectedAvatar = null;
    
    // 工具函数
    function toBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }
    
    function fromBase64(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }
    
    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('zh-CN');
    }
    
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-gray-700';
      toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-medium fade-in`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // 登录检查 - 使用统一的登录状态检查
    function checkLogin() {
      // 使用 auth.js 中的统一登录状态同步函数
      const loginState = syncLoginState();
      
      if (!loginState.isLoggedIn) {
        // 未登录
        document.getElementById('loginRequired').classList.remove('hidden');
        document.getElementById('mainContent').classList.add('hidden');
        return;
      }
      
      // 已登录
      document.getElementById('loginRequired').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      
      currentUser = { username: loginState.username, uid: loginState.uid };
      showLoggedInState(loginState.username, loginState.uid);
      loadUserInfo(loginState.uid);
    }
    
    async function loadUserInfo(uid) {
      const token = getToken();
      
      try {
        const res = await fetch(`https://api.github.com/repos/${USER_REPO}/contents/users.json?ref=main&_=${Date.now()}`, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        
        if (res.ok) {
          const data = await res.json();
          const content = JSON.parse(fromBase64(data.content));
          const user = content.users.find(u => u.uid === uid);
          
          if (user) {
            currentUser = { ...currentUser, ...user };
            updateProfileDisplay(user);
            
            // 检查是否是管理员
            if (ADMINS.includes(user.username) || ADMINS.includes(user.uid)) {
              document.getElementById('adminSection').classList.remove('hidden');
              document.getElementById('accountType').innerHTML = '<span class="text-violet-600 font-medium">管理员</span>';
            }
          }
        }
      } catch (err) {
        console.error('加载用户信息失败:', err);
      }
    }
    
    function updateProfileDisplay(user) {
      document.getElementById('profileName').textContent = user.displayName || user.username;
      document.getElementById('profileUid').textContent = `UID: ${user.uid}`;
      document.getElementById('profileBio').textContent = user.profile?.bio || '暂无签名';
      document.getElementById('accountUid').textContent = user.uid;
      document.getElementById('accountCreatedAt').textContent = formatDate(user.createdAt);
      
      // 头像
      const avatarEl = document.getElementById('profileAvatar');
      const initialEl = document.getElementById('profileInitial');
      
      if (user.profile?.avatar && user.profile.avatar.startsWith('http')) {
        avatarEl.innerHTML = `<img src="${escapeHtml(user.profile.avatar)}" alt="头像" class="w-full h-full object-cover">`;
      } else if (user.profile?.avatar) {
        initialEl.textContent = user.profile.avatar;
        avatarEl.className = `w-20 h-20 bg-gradient-to-br ${getAvatarColor(user.displayName || user.username)} rounded-2xl flex items-center justify-center text-white text-3xl font-semibold`;
      } else {
        initialEl.textContent = (user.displayName || user.username).charAt(0).toUpperCase();
        avatarEl.className = `w-20 h-20 bg-gradient-to-br ${getAvatarColor(user.displayName || user.username)} rounded-2xl flex items-center justify-center text-white text-3xl font-semibold`;
      }
      
      // 角色标签
      const roleEl = document.getElementById('profileRole');
      if (user.role === 'admin') {
        roleEl.textContent = '管理员';
        roleEl.className = 'px-2 py-0.5 text-xs rounded-full bg-purple-100 text-purple-700';
      } else {
        roleEl.textContent = '用户';
        roleEl.className = 'px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600';
      }
    }
    
    function showLoggedInState(username, uid) {
      document.getElementById('authButtons').classList.add('hidden');
      document.getElementById('userMenu').classList.remove('hidden');
      document.getElementById('userDisplayName').textContent = username;
    }
    
    // 编辑资料
    function showEditModal() {
      document.getElementById('editModal').classList.remove('hidden');
      document.getElementById('editModal').classList.add('flex');
      document.getElementById('editDisplayName').value = currentUser?.displayName || '';
      document.getElementById('editBio').value = currentUser?.profile?.bio || '';
    }
    
    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
      document.getElementById('editModal').classList.remove('flex');
    }
    
    async function saveProfile() {
      const displayName = document.getElementById('editDisplayName').value.trim();
      const bio = document.getElementById('editBio').value.trim();
      
      if (!displayName) {
        document.getElementById('editError').textContent = '请输入显示名称';
        document.getElementById('editError').classList.remove('hidden');
        return;
      }
      
      const token = getToken();
      
      try {
        const res = await fetch(`https://api.github.com/repos/${USER_REPO}/contents/users.json?ref=main`, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        
        const data = await res.json();
        const content = JSON.parse(fromBase64(data.content));
        
        const userIndex = content.users.findIndex(u => u.uid === currentUser.uid);
        if (userIndex !== -1) {
          content.users[userIndex].displayName = displayName;
          content.users[userIndex].profile = content.users[userIndex].profile || {};
          content.users[userIndex].profile.bio = bio;
        }
        
        const saveRes = await fetch(`https://api.github.com/repos/${USER_REPO}/contents/users.json`, {
          method: 'PUT',
          headers: { 
            'Authorization': `token ${token}`, 
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Update profile: ${currentUser.username}`,
            content: toBase64(JSON.stringify(content, null, 2)),
            sha: data.sha
          })
        });
        
        if (saveRes.ok) {
          currentUser.displayName = displayName;
          currentUser.profile = { ...currentUser.profile, bio };
          updateProfileDisplay(currentUser);
          closeEditModal();
          showToast('资料已保存');
        } else {
          throw new Error('保存失败');
        }
      } catch (err) {
        document.getElementById('editError').textContent = '保存失败，请重试';
        document.getElementById('editError').classList.remove('hidden');
      }
    }
    
    // 头像设置
    function showAvatarModal() {
      document.getElementById('avatarModal').classList.remove('hidden');
      document.getElementById('avatarModal').classList.add('flex');
      
      // 初始化头像选项
      const container = document.getElementById('avatarOptions');
      container.innerHTML = PRESET_AVATARS.map(a => `
        <div class="avatar-option bg-gradient-to-br ${a.color}" onclick="selectAvatar('${a.emoji}')" data-avatar="${a.emoji}">${a.emoji}</div>
      `).join('');
      
      // 显示当前头像
      updateAvatarPreview();
      document.getElementById('customAvatarUrl').value = (currentUser?.profile?.avatar?.startsWith('http')) ? currentUser.profile.avatar : '';
      selectedAvatar = null;
      document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
    }
    
    function closeAvatarModal() {
      document.getElementById('avatarModal').classList.add('hidden');
      document.getElementById('avatarModal').classList.remove('flex');
    }
    
    function selectAvatar(emoji) {
      selectedAvatar = emoji;
      document.querySelectorAll('.avatar-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.avatar === emoji);
      });
      document.getElementById('customAvatarUrl').value = '';
      updateAvatarPreview(emoji);
    }
    
    function updateAvatarPreview(emoji) {
      const preview = document.getElementById('avatarPreview');
      const customUrl = document.getElementById('customAvatarUrl')?.value?.trim();
      
      if (customUrl && customUrl.startsWith('http')) {
        preview.innerHTML = `<img src="${escapeHtml(customUrl)}" alt="头像" class="w-full h-full object-cover">`;
        preview.className = 'w-24 h-24 rounded-2xl mx-auto mb-4 overflow-hidden';
      } else if (emoji || selectedAvatar) {
        preview.textContent = emoji || selectedAvatar;
        preview.className = `w-24 h-24 bg-gradient-to-br ${getAvatarColor(currentUser?.displayName || 'User')} rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-semibold`;
      } else if (currentUser?.profile?.avatar?.startsWith('http')) {
        preview.innerHTML = `<img src="${escapeHtml(currentUser.profile.avatar)}" alt="头像" class="w-full h-full object-cover">`;
        preview.className = 'w-24 h-24 rounded-2xl mx-auto mb-4 overflow-hidden';
      } else if (currentUser?.profile?.avatar) {
        preview.textContent = currentUser.profile.avatar;
        preview.className = `w-24 h-24 bg-gradient-to-br ${getAvatarColor(currentUser?.displayName || 'User')} rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-semibold`;
      } else {
        preview.textContent = (currentUser?.displayName || 'U').charAt(0).toUpperCase();
        preview.className = `w-24 h-24 bg-gradient-to-br ${getAvatarColor(currentUser?.displayName || 'User')} rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-semibold`;
      }
    }
    
    document.getElementById('customAvatarUrl')?.addEventListener('input', () => updateAvatarPreview());
    
    async function saveAvatar() {
      const customUrl = document.getElementById('customAvatarUrl').value.trim();
      const avatar = customUrl || selectedAvatar || currentUser?.profile?.avatar;
      
      if (!avatar) {
        document.getElementById('avatarError').textContent = '请选择或输入头像';
        document.getElementById('avatarError').classList.remove('hidden');
        return;
      }
      
      const token = getToken();
      
      try {
        const res = await fetch(`https://api.github.com/repos/${USER_REPO}/contents/users.json?ref=main`, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        
        const data = await res.json();
        const content = JSON.parse(fromBase64(data.content));
        
        const userIndex = content.users.findIndex(u => u.uid === currentUser.uid);
        if (userIndex !== -1) {
          content.users[userIndex].profile = content.users[userIndex].profile || {};
          content.users[userIndex].profile.avatar = avatar;
        }
        
        const saveRes = await fetch(`https://api.github.com/repos/${USER_REPO}/contents/users.json`, {
          method: 'PUT',
          headers: { 
            'Authorization': `token ${token}`, 
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Update avatar: ${currentUser.username}`,
            content: toBase64(JSON.stringify(content, null, 2)),
            sha: data.sha
          })
        });
        
        if (saveRes.ok) {
          currentUser.profile = { ...currentUser.profile, avatar };
          updateProfileDisplay(currentUser);
          closeAvatarModal();
          showToast('头像已更新');
        } else {
          throw new Error('保存失败');
        }
      } catch (err) {
        document.getElementById('avatarError').textContent = '保存失败，请重试';
        document.getElementById('avatarError').classList.remove('hidden');
      }
    }
    
    // 修改密码
    function showPasswordModal() {
      document.getElementById('passwordModal').classList.remove('hidden');
      document.getElementById('passwordModal').classList.add('flex');
    }
    
    function closePasswordModal() {
      document.getElementById('passwordModal').classList.add('hidden');
      document.getElementById('passwordModal').classList.remove('flex');
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('passwordError').classList.add('hidden');
      document.getElementById('passwordSuccess').classList.add('hidden');
    }
    
    async function changePassword() {
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (!oldPassword || !newPassword || !confirmPassword) {
        document.getElementById('passwordError').textContent = '请填写所有字段';
        document.getElementById('passwordError').classList.remove('hidden');
        return;
      }
      
      if (newPassword.length < 4) {
        document.getElementById('passwordError').textContent = '新密码至少4位';
        document.getElementById('passwordError').classList.remove('hidden');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        document.getElementById('passwordError').textContent = '两次输入的密码不一致';
        document.getElementById('passwordError').classList.remove('hidden');
        return;
      }
      
      const auth = await getAuth();
      const result = await auth.changePassword(currentUser.username, oldPassword, newPassword);
      
      if (result.success) {
        document.getElementById('passwordError').classList.add('hidden');
        document.getElementById('passwordSuccess').textContent = '密码修改成功';
        document.getElementById('passwordSuccess').classList.remove('hidden');
        setTimeout(() => closePasswordModal(), 1500);
      } else {
        document.getElementById('passwordError').textContent = result.error;
        document.getElementById('passwordError').classList.remove('hidden');
      }
    }
    
    // 清除本地数据
    function clearLocalData() {
      if (confirm('确定要清除所有本地缓存吗？这不会影响您的账户数据。')) {
        localStorage.clear();
        sessionStorage.clear();
        showToast('本地缓存已清除');
      }
    }
    
    // 登录弹窗
    function showLoginModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }
    
    // 登录表单处理
    const modal = document.getElementById('modal');
    const loginBtn = document.getElementById('loginBtn');
    const authButtons = document.getElementById('authButtons');
    const userMenu = document.getElementById('userMenu');
    const userBtn = document.getElementById('userBtn');
    const dropdown = document.getElementById('dropdown');
    const closeBtn = document.getElementById('closeBtn');
    const authForm = document.getElementById('authForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    
    loginBtn?.addEventListener('click', showLoginModal);
    closeBtn?.addEventListener('click', () => { modal.classList.add('hidden'); modal.classList.remove('flex'); errorMsg.classList.add('hidden'); });
    userBtn?.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
    document.addEventListener('click', () => { dropdown.classList.add('hidden'); });
    
    authForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password');
      const passwordVal = password ? password.value : '';
      const rememberMe = document.getElementById('rememberMe').checked;
      
      if (!username || !passwordVal) { showError('用户名和密码不能为空'); return; }
      
      try {
        const auth = await getAuth();
        const result = await auth.validateUser(username, passwordVal);
        
        if (result.success) {
          sessionStorage.setItem('rui_user', result.user.username);
          sessionStorage.setItem('rui_uid', result.user.uid);
          // 始终存储到 localStorage 以便跨页面同步
          localStorage.setItem('rui_user_remember', result.user.username);
          localStorage.setItem('rui_uid_remember', result.user.uid);
          if (rememberMe) {
            // 记住登录：7天过期
            localStorage.setItem('rui_user_expire', (Date.now() + 7 * 24 * 60 * 60 * 1000).toString());
          } else {
            // 不记住：1小时过期
            localStorage.setItem('rui_user_expire', (Date.now() + 1 * 60 * 60 * 1000).toString());
          }
          showSuccess('登录成功！');
          setTimeout(() => location.reload(), 500);
        } else {
          showError(result.error);
        }
      } catch (err) {
        showError('登录失败，请重试');
      }
    });
    
    function logout() {
      sessionStorage.removeItem('rui_user');
      sessionStorage.removeItem('rui_uid');
      localStorage.removeItem('rui_user_remember');
      localStorage.removeItem('rui_uid_remember');
      localStorage.removeItem('rui_user_expire');
      location.reload();
    }
    
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      successMsg.classList.add('hidden');
    }
    
    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.remove('hidden');
      errorMsg.classList.add('hidden');
    }
    
    // 初始化
    checkLogin();
  </script>
</body>
</html>
