<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 搜索 - Rui Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>* { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="min-h-screen bg-white text-gray-900 flex flex-col">
  
  <!-- 顶部导航栏 -->
  <nav class="w-full px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="index.html" class="text-xl font-semibold text-gray-900 hover:text-violet-600 transition-colors">Rui</a>
        <div class="flex items-center gap-6 text-sm">
          <a href="projects.html" class="text-gray-500 hover:text-gray-900 transition-colors">项目</a>
          <a href="toolbox.html" class="text-gray-500 hover:text-gray-900 transition-colors">百宝箱</a>
          <a href="download.html" class="text-gray-500 hover:text-gray-900 transition-colors">下载</a>
          <a href="chat.html" class="text-gray-500 hover:text-gray-900 transition-colors">💬 聊天</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="authButtons">
          <a href="register.html" class="px-4 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200 transition-colors">注册</a>
          <button id="loginBtn" class="ml-2 px-4 py-1.5 bg-gray-900 text-white text-xs font-medium rounded-lg hover:bg-gray-800 transition-colors">登录</button>
        </div>
        <div id="userMenu" class="hidden relative">
          <button id="userBtn" class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
            <span id="userDisplayName" class="text-sm text-gray-700"></span>
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div id="dropdown" class="hidden absolute right-0 top-full mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 py-1 overflow-hidden">
            <a href="cloud.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
              云盘
            </a>
            <a href="profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              我的
            </a>
            <div class="border-t border-gray-100"></div>
            <a href="javascript:void(0)" onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
              退出登录
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="flex-1 px-6 py-12">
    <div class="max-w-4xl mx-auto">
      <!-- 搜索框 -->
      <div class="mb-8">
        <div class="flex items-center gap-3">
          <svg class="w-6 h-6 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <h1 class="text-2xl font-semibold text-gray-900">GitHub 搜索</h1>
        </div>
        <form onsubmit="doSearch(event)" class="mt-4 flex gap-3">
          <input id="searchInput" type="text" placeholder="搜索GitHub仓库..." class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-300 focus:bg-white transition-colors" />
          <button type="submit" class="px-6 py-3 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 transition-colors">搜索</button>
        </form>
      </div>

      <!-- 搜索结果 -->
      <div id="results" class="space-y-4">
        <div class="text-center py-16 text-gray-400">
          <svg class="w-16 h-16 mx-auto mb-4 text-gray-200" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <p>输入关键词搜索GitHub仓库</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between text-xs text-gray-400">
      <span>© 2026 Rui Hub</span>
      <div class="flex items-center gap-6">
        <a href="https://github.com/RuiweihanHub" target="_blank" class="hover:text-gray-600 transition-colors">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- 登录弹窗 -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/30 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
      <div class="p-6 border-b border-gray-100">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-900">登录</h2>
          <button id="closeBtn" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>
      </div>
      <form id="authForm" class="p-6 space-y-4">
        <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600"></div>
        <div id="successMsg" class="hidden p-3 bg-green-50 border border-green-100 rounded-lg text-sm text-green-600"></div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
          <input id="username" type="text" placeholder="请输入用户名" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-300 focus:bg-white transition-colors" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
          <input id="password" type="password" placeholder="请输入密码" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-300 focus:bg-white transition-colors" required />
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-300 text-gray-900 focus:ring-gray-500" />
          <label for="rememberMe" class="text-sm text-gray-600">保持登录（7天）</label>
        </div>
        <button type="submit" class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 disabled:opacity-50 transition-colors">登录</button>
        <div class="text-center text-sm text-gray-500">
          没有账号？<a href="register.html" class="text-violet-600 hover:text-violet-700 font-medium">立即注册</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const LOCAL_USERS = { 'Xvjiarui': 'o7dyuk', 'Ruiweihan': '6052ni', 'Administrator': '1u98e9' };

    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) { hash = ((hash << 5) - hash) + password.charCodeAt(i); hash = hash & hash; }
      return Math.abs(hash).toString(36);
    }

    const modal = document.getElementById('modal');
    const loginBtn = document.getElementById('loginBtn');
    const authButtons = document.getElementById('authButtons');
    const userMenu = document.getElementById('userMenu');
    const userBtn = document.getElementById('userBtn');
    const dropdown = document.getElementById('dropdown');
    const closeBtn = document.getElementById('closeBtn');
    const authForm = document.getElementById('authForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    function checkLogin() {
      const sessionUser = sessionStorage.getItem('rui_user');
      const rememberedUser = localStorage.getItem('rui_user_remember');
      if (sessionUser) showLoggedInState(sessionUser);
      else if (rememberedUser) {
        const expireTime = localStorage.getItem('rui_user_expire');
        if (expireTime && Date.now() < parseInt(expireTime)) { sessionStorage.setItem('rui_user', rememberedUser); showLoggedInState(rememberedUser); }
        else { localStorage.removeItem('rui_user_remember'); localStorage.removeItem('rui_user_expire'); }
      }
    }
    checkLogin();

    function showLoggedInState(username) {
      authButtons.classList.add('hidden');
      userMenu.classList.remove('hidden');
      document.getElementById('userDisplayName').textContent = username;
    }

    loginBtn.addEventListener('click', () => { modal.classList.remove('hidden'); modal.classList.add('flex'); });
    closeBtn.addEventListener('click', () => { modal.classList.add('hidden'); modal.classList.remove('flex'); errorMsg.classList.add('hidden'); });
    userBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
    document.addEventListener('click', () => { dropdown.classList.add('hidden'); });

    authForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const rememberMe = document.getElementById('rememberMe').checked;
      if (!username || !password) { showError('用户名和密码不能为空'); return; }
      if (LOCAL_USERS[username] && LOCAL_USERS[username] === hashPassword(password)) {
        sessionStorage.setItem('rui_user', username);
        if (rememberMe) { localStorage.setItem('rui_user_remember', username); localStorage.setItem('rui_user_expire', (Date.now() + 7 * 24 * 60 * 60 * 1000).toString()); }
        showSuccess('登录成功！');
        setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); showLoggedInState(username); }, 500);
      } else { showError('用户名或密码错误'); }
    });

    function logout() { sessionStorage.removeItem('rui_user'); localStorage.removeItem('rui_user_remember'); localStorage.removeItem('rui_user_expire'); location.reload(); }
    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); successMsg.classList.add('hidden'); }
    function showSuccess(msg) { successMsg.textContent = msg; successMsg.classList.remove('hidden'); errorMsg.classList.add('hidden'); }

    // GitHub搜索
    async function doSearch(e) {
      e.preventDefault();
      var query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      var results = document.getElementById('results');
      results.innerHTML = '<div class="text-center py-16 text-gray-400"><div class="animate-spin w-8 h-8 border-2 border-gray-300 border-t-gray-600 rounded-full mx-auto mb-4"></div>搜索中...</div>';

      try {
        var response = await fetch('https://api.github.com/search/repositories?q=' + encodeURIComponent(query) + '&sort=stars&order=desc&per_page=20');
        var data = await response.json();

        if (data.items && data.items.length > 0) {
          var html = '<p class="text-sm text-gray-500 mb-4">找到 ' + data.total_count + ' 个仓库</p>';
          data.items.forEach(function(repo) {
            var desc = repo.description || '暂无描述';
            var lang = repo.language || 'Unknown';
            var langColor = getLangColor(lang);
            html += '<a href="' + repo.html_url + '" target="_blank" class="block p-5 bg-gray-50 rounded-xl border border-gray-100 hover:border-gray-200 hover:bg-gray-100 transition-all">' +
              '<div class="flex items-start justify-between gap-4">' +
                '<div class="flex-1 min-w-0">' +
                  '<h3 class="text-base font-medium text-blue-600 hover:underline truncate">' + repo.full_name + '</h3>' +
                  '<p class="text-sm text-gray-500 mt-1.5 line-clamp-2">' + desc + '</p>' +
                  '<div class="flex items-center gap-4 mt-3">' +
                    '<span class="flex items-center gap-1.5">' +
                      '<span class="w-3 h-3 rounded-full" style="background-color: ' + langColor + '"></span>' +
                      '<span class="text-xs text-gray-500">' + lang + '</span>' +
                    '</span>' +
                    '<span class="text-xs text-gray-400">更新于 ' + formatDate(repo.updated_at) + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="flex flex-col items-end gap-2">' +
                  '<div class="flex items-center gap-1 text-yellow-500">' +
                    '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>' +
                    '<span class="text-sm font-medium">' + formatStars(repo.stargazers_count) + '</span>' +
                  '</div>' +
                  '<div class="flex items-center gap-1 text-gray-400">' +
                    '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>' +
                    '<span class="text-xs">' + formatStars(repo.forks_count) + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</a>';
          });
          results.innerHTML = html;
        } else {
          results.innerHTML = '<div class="text-center py-16 text-gray-400">未找到相关仓库</div>';
        }
      } catch (error) {
        results.innerHTML = '<div class="text-center py-16 text-red-400">搜索失败，请稍后重试</div>';
      }
    }

    function formatStars(num) {
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'k';
      }
      return num.toString();
    }

    function formatDate(dateStr) {
      var date = new Date(dateStr);
      var now = new Date();
      var diff = now - date;
      var days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 7) return days + ' 天前';
      if (days < 30) return Math.floor(days / 7) + ' 周前';
      if (days < 365) return Math.floor(days / 30) + ' 月前';
      return Math.floor(days / 365) + ' 年前';
    }

    function getLangColor(lang) {
      var colors = {
        'JavaScript': '#f1e05a',
        'TypeScript': '#3178c6',
        'Python': '#3572A5',
        'Java': '#b07219',
        'C++': '#f34b7d',
        'C': '#555555',
        'C#': '#239120',
        'Go': '#00ADD8',
        'Rust': '#dea584',
        'Ruby': '#701516',
        'PHP': '#4F5D95',
        'Swift': '#F05138',
        'Kotlin': '#A97BFF',
        'Dart': '#00B4AB',
        'Vue': '#41b883',
        'HTML': '#e34c26',
        'CSS': '#563d7c',
        'Shell': '#89e051',
        'Unknown': '#cccccc'
      };
      return colors[lang] || '#cccccc';
    }

    // 从URL获取搜索词
    var urlQuery = new URLSearchParams(window.location.search).get('q');
    if (urlQuery) {
      document.getElementById('searchInput').value = urlQuery;
      doSearch({ preventDefault: function() {} });
    }
  </script>
</body>
</html>
